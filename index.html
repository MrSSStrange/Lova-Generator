<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Любовный генератор</title>
</head>

<body>
    <main class="hero">
        <section class="content">
            <p class="label">Love generator</p>
            <h1>Проверь совместимость имен</h1>
            <p class="text">
                Введите два имени, а генератор покажет случайный результат совместимости.
            </p>
            <input class="name-one" type="text" placeholder="Ваше имя">
            <input class="name-two" type="text" placeholder="Имя второй половинки">
            <button class="button">Проверить</button>
            <p class="result"></p>
        </section>

    </main>
    <script src="js.js"></script>
</body>

</html>
